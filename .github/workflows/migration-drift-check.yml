name: Migration Drift Check

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "backend/migrations/**"

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run migration drift check
        run: node scripts/check-migration-drift.js
